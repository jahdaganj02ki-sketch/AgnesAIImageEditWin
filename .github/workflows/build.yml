name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore AgnesAIImageEdit/AgnesAIImageEdit.csproj AgnesAIImageEdit.Tests/AgnesAIImageEdit.Tests.csproj
        shell: pwsh

      - name: Run tests
        run: dotnet test AgnesAIImageEdit.Tests/AgnesAIImageEdit.Tests.csproj -c Release --no-build
        shell: pwsh

      - name: Publish (self-contained, single-file)
        run: |
          dotnet publish AgnesAIImageEdit/AgnesAIImageEdit.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Compile installer (Inno Setup)
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc "build/install.iss" `
            /dMyAppVersion=${{ github.ref_type == 'tag' && github.ref_name || '0.0.0-dev' }} `
            /dPublishOutput=${{ github.workspace }}\publish
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgnesAIImageEdit-Setup
          path: build/out/AgnesAIImageEdit-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/out/AgnesAIImageEdit-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
